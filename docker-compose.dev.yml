services:
  # Control Plane Backend (Hot Reload)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: owlapi_backend_dev
    command: air -c .air.server.toml
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "9090:9090"
    volumes:
      - ./backend:/app
      - /app/tmp # Mount tmp as anonymous volume to avoid host permission issues and conflicts
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/owlapi?sslmode=disable
      - OWLAPI_HTTP_PORT=:3000
      - GOPROXY=https://goproxy.cn,direct
    depends_on:
      postgres:
        condition: service_healthy
      backend-init:
        condition: service_completed_successfully

  # Admin Frontend (Hot Reload)
  admin:
    build:
      context: ./frontend/admin
      dockerfile: Dockerfile.dev
    container_name: owlapi_admin_dev
    command: sh -c "pnpm install && PORT=8000 pnpm dev"
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./frontend/admin:/app
      - /app/node_modules # Anonymous volume for container dependencies
      - /app/.next # Anonymous volume for build cache
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    depends_on:
      backend:
        condition: service_started

  # Local Gateway Node (Hot Reload)
  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: owlapi_gateway_dev
    command: air -c .air.runner.toml
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - /app/tmp
    environment:
      - OWLAPI_SERVER_URL=dns:///backend:9090
      - OWLAPI_RUNNER_ID=dev-docker-runner
      - OWLAPI_RUNNER_TOKEN=dev-token
      - TZ=Asia/Shanghai
      - GOPROXY=https://goproxy.cn,direct
    depends_on:
      backend:
        condition: service_started

  # PostgreSQL Database
  postgres:
    image: postgres:18-alpine
    container_name: owlapi_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=owlapi
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432" # Use 5433 to avoid conflict with local postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Init: schema + seed demo data (runs every startup)
  backend-init:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: owlapi_init_dev
    command: go run cmd/init/main.go
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/owlapi?sslmode=disable
      - GOPROXY=https://goproxy.cn,direct
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # Docs Site (VitePress)
  docs:
    image: node:20-alpine
    container_name: owlapi_docs_dev
    working_dir: /app
    command: sh -c "npm config set registry https://registry.npmmirror.com && corepack enable && pnpm install && pnpm docs:dev --host 0.0.0.0 --port 8001"
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./frontend/docs:/app
      - /app/node_modules

volumes:
  postgres_data:
