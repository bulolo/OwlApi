openapi: "3.0.3"
info:
  title: OwlApi
  version: 0.1.0
  description: OwlApi 云平台 API

servers:
  - url: http://localhost:3000
    description: Local dev

paths:
  # ==================== Auth ====================
  /api/v1/auth/register:
    post:
      operationId: register
      tags: [Auth]
      summary: 注册账号
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: 注册成功

  /api/v1/auth/login:
    post:
      operationId: login
      tags: [Auth]
      summary: 登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登录成功

  # ==================== Tenants ====================
  /api/v1/tenants:
    get:
      operationId: listTenants
      tags: [Tenants]
      summary: 租户列表 (分页)
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: size
          in: query
          schema: { type: integer, default: 10 }
        - name: is_pager
          in: query
          schema: { type: integer, default: 1 }
          description: "0=不分页返回全量, 1=分页"
      responses:
        "200":
          description: OK
    post:
      operationId: createTenant
      tags: [Tenants]
      summary: 创建租户
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantRequest"
      responses:
        "200":
          description: 创建成功

  /api/v1/tenants/{slug}:
    get:
      operationId: getTenant
      tags: [Tenants]
      summary: 获取租户详情
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
    put:
      operationId: updateTenant
      tags: [Tenants]
      summary: 编辑租户
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantRequest"
      responses:
        "200":
          description: OK
    delete:
      operationId: deleteTenant
      tags: [Tenants]
      summary: 删除租户
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK

  # ==================== Users ====================
  /api/v1/tenants/{slug}/users:
    get:
      operationId: listUsers
      tags: [Users]
      summary: 用户列表 (分页)
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: size
          in: query
          schema: { type: integer, default: 10 }
      responses:
        "200":
          description: OK
    post:
      operationId: addUser
      tags: [Users]
      summary: 添加用户
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMemberRequest"
      responses:
        "200":
          description: 添加成功

  /api/v1/tenants/{slug}/users/{userId}/role:
    put:
      operationId: updateUserRole
      tags: [Users]
      summary: 修改用户角色
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: userId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoleRequest"
      responses:
        "200":
          description: OK

  /api/v1/tenants/{slug}/users/{userId}:
    delete:
      operationId: removeUser
      tags: [Users]
      summary: 移除用户
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK

# ==================== Schemas ====================
components:
  schemas:
    RegisterRequest:
      type: object
      required: [email, name, password]
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        password:
          type: string
          format: password
        tenant_name:
          type: string
        tenant_slug:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
        tenant:
          $ref: "#/components/schemas/Tenant"
        tenants:
          type: array
          items:
            $ref: "#/components/schemas/Tenant"

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        is_superadmin:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Tenant:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        plan:
          type: string
          enum: [Free, Pro, Enterprise]
        status:
          type: string
          enum: [Active, Warning, Suspended]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateTenantRequest:
      type: object
      required: [name, slug, user_id]
      properties:
        name:
          type: string
        slug:
          type: string
        plan:
          type: string
          enum: [Free, Pro, Enterprise]
        user_id:
          type: string

    UpdateTenantRequest:
      type: object
      properties:
        name:
          type: string
        plan:
          type: string
          enum: [Free, Pro, Enterprise]
        status:
          type: string
          enum: [Active, Warning, Suspended]

    TenantMember:
      type: object
      properties:
        tenant_id:
          type: string
        user_id:
          type: string
        role:
          type: string
          enum: [Admin, Viewer]
        joined_at:
          type: string
          format: date-time
        user:
          $ref: "#/components/schemas/User"

    AddMemberRequest:
      type: object
      required: [email, name, password, role]
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        password:
          type: string
          format: password
        role:
          type: string
          enum: [Admin, Viewer]

    UpdateRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [Admin, Viewer]
