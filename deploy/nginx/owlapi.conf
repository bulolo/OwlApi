# ==============================================================================
# OwlApi Nginx 生产环境配置
# 证书路径: /etc/nginx/ssl/owlapi_cn.pem / owlapi_cn.key
# ==============================================================================

# ------------------------------------------------------------------------------
# 通用代理头 (所有 server 块继承)
# ------------------------------------------------------------------------------
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Port  $server_port;

# 安全响应头
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Frame-Options          "SAMEORIGIN"                           always;
add_header X-Content-Type-Options   "nosniff"                              always;
add_header Referrer-Policy          "strict-origin-when-cross-origin"      always;

# Gzip 压缩
gzip            on;
gzip_proxied    any;
gzip_comp_level 6;
gzip_types      text/plain text/css application/json application/javascript
                text/xml application/xml application/xml+rss text/javascript;

# ------------------------------------------------------------------------------
# HTTP → HTTPS 强制跳转
# ------------------------------------------------------------------------------
server {
    listen      80;
    server_name owlapi.cn www.owlapi.cn admin.owlapi.cn api.owlapi.cn docs.owlapi.cn;

    return 301 https://$host$request_uri;
}

# ------------------------------------------------------------------------------
# SSL 公共片段 (每个 server 块中引用)
# ------------------------------------------------------------------------------
# 证书统一放在 /etc/nginx/ssl/ 下，使用通配符证书。
# 如需为每个子域名单独配置，复制对应 ssl_certificate 行覆盖即可。

# ------------------------------------------------------------------------------
# [Admin Dashboard]  admin.owlapi.cn → :8001
# ------------------------------------------------------------------------------
server {
    listen      443 ssl;
    server_name admin.owlapi.cn;

    ssl_certificate     /etc/nginx/ssl/owlapi_cn.pem;
    ssl_certificate_key /etc/nginx/ssl/owlapi_cn.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://127.0.0.1:8001;
    }
}

# ------------------------------------------------------------------------------
# [Main Website]  owlapi.cn / www.owlapi.cn → :8004
# ------------------------------------------------------------------------------
server {
    listen      443 ssl;
    server_name owlapi.cn www.owlapi.cn;

    ssl_certificate     /etc/nginx/ssl/owlapi_cn.pem;
    ssl_certificate_key /etc/nginx/ssl/owlapi_cn.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://127.0.0.1:8004;
    }
}

# ------------------------------------------------------------------------------
# [Documentation]  docs.owlapi.cn → :8003
# ------------------------------------------------------------------------------
server {
    listen      443 ssl;
    server_name docs.owlapi.cn;

    ssl_certificate     /etc/nginx/ssl/owlapi_cn.pem;
    ssl_certificate_key /etc/nginx/ssl/owlapi_cn.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://127.0.0.1:8003;
    }
}

# ------------------------------------------------------------------------------
# [Backend API]  api.owlapi.cn → :3000
# SSE / 长连接优化，禁用响应缓冲
# ------------------------------------------------------------------------------
server {
    listen      443 ssl;
    server_name api.owlapi.cn;

    ssl_certificate     /etc/nginx/ssl/owlapi_cn.pem;
    ssl_certificate_key /etc/nginx/ssl/owlapi_cn.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # SSE / AI 生成长连接
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_buffering    off;

    location / {
        proxy_pass http://127.0.0.1:3000;
    }
}
