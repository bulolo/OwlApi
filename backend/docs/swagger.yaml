basePath: /
definitions:
  domain.APIEndpoint:
    properties:
      active_version:
        description: current live version number (0 if not published)
        type: integer
      created_at:
        type: string
      datasource_id:
        type: integer
      description:
        type: string
      group_id:
        type: integer
      has_draft:
        description: true iff updated_at > activated_at (or not published yet but
          at least one version exists)
        type: boolean
      id:
        type: integer
      is_published:
        description: 'Derived/computed fields (not stored on the row itself):'
        type: boolean
      latest_version:
        description: newest version number in endpoint_versions for this endpoint
          (0 if no versions)
        type: integer
      methods:
        items:
          type: string
        type: array
      param_defs:
        items:
          $ref: '#/definitions/domain.ParamDef'
        type: array
      params:
        items:
          type: string
        type: array
      path:
        type: string
      post_script_id:
        type: integer
      pre_script_id:
        type: integer
      project_id:
        type: integer
      sql:
        type: string
      summary:
        type: string
      tenant_id:
        type: integer
      updated_at:
        type: string
    type: object
  domain.ParamDef:
    properties:
      default:
        type: string
      desc:
        type: string
      name:
        type: string
      required:
        type: boolean
      type:
        description: string, integer, number, boolean
        type: string
