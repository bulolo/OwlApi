openapi: "3.0.3"
info:
  title: OwlApi
  version: 0.1.0
  description: OwlApi 云平台 API

servers:
  - url: http://localhost:3000
    description: Local dev

security:
  - BearerAuth: []

paths:
  /api/v1/auth/register:
    post:
      operationId: register
      tags: [Auth]
      summary: 注册账号
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: OK

  /api/v1/auth/login:
    post:
      operationId: login
      tags: [Auth]
      summary: 登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK

  /api/v1/my/tenants:
    get:
      operationId: myTenants
      tags: [Tenants]
      summary: 当前用户的租户列表
      parameters:
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: size, in: query, schema: { type: integer, default: 10 } }
      responses:
        "200":
          description: OK

  /api/v1/tenants:
    get:
      operationId: listTenants
      tags: [Tenants]
      summary: 租户列表 (SuperAdmin)
      parameters:
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: size, in: query, schema: { type: integer, default: 10 } }
        - { name: is_pager, in: query, schema: { type: integer, default: 1 } }
      responses:
        "200":
          description: OK
    post:
      operationId: createTenant
      tags: [Tenants]
      summary: 创建租户
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantRequest"
      responses:
        "200":
          description: OK

  /api/v1/tenants/{slug}:
    get:
      operationId: getTenant
      tags: [Tenants]
      summary: 获取租户详情
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
    put:
      operationId: updateTenant
      tags: [Tenants]
      summary: 编辑租户
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantRequest"
      responses:
        "200":
          description: OK
    delete:
      operationId: deleteTenant
      tags: [Tenants]
      summary: 删除租户
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK

  /api/v1/tenants/{slug}/users:
    get:
      operationId: listUsers
      tags: [Users]
      summary: 用户列表
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: size, in: query, schema: { type: integer, default: 10 } }
      responses:
        "200":
          description: OK
    post:
      operationId: addUser
      tags: [Users]
      summary: 添加用户
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddUserRequest"
      responses:
        "200":
          description: OK

  /api/v1/tenants/{slug}/users/{userId}/role:
    put:
      operationId: updateUserRole
      tags: [Users]
      summary: 修改用户角色
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: userId, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoleRequest"
      responses:
        "200":
          description: OK

  /api/v1/tenants/{slug}/users/{userId}:
    delete:
      operationId: removeUser
      tags: [Users]
      summary: 移除用户
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: userId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: OK

  /api/v1/tenants/{slug}/gateways:
    get:
      operationId: listGateways
      tags: [Gateways]
      summary: 网关节点列表
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
    post:
      operationId: createGateway
      tags: [Gateways]
      summary: 创建网关节点
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGatewayRequest"
      responses:
        "200":
          description: OK

  /api/v1/tenants/{slug}/gateways/{gatewayId}:
    get:
      operationId: getGateway
      tags: [Gateways]
      summary: 获取网关节点详情
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: gatewayId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: OK
    delete:
      operationId: deleteGateway
      tags: [Gateways]
      summary: 删除网关节点
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: gatewayId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: OK

  /api/v1/tenants/{slug}/datasources:
    get:
      operationId: listDataSources
      tags: [DataSources]
      summary: 数据源列表
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
    post:
      operationId: createDataSource
      tags: [DataSources]
      summary: 创建数据源
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDataSourceRequest"
      responses:
        "200":
          description: OK

  /api/v1/tenants/{slug}/datasources/{datasourceId}:
    get:
      operationId: getDataSource
      tags: [DataSources]
      summary: 获取数据源详情
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: datasourceId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: OK
    put:
      operationId: updateDataSource
      tags: [DataSources]
      summary: 编辑数据源
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: datasourceId, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDataSourceRequest"
      responses:
        "200":
          description: OK
    delete:
      operationId: deleteDataSource
      tags: [DataSources]
      summary: 删除数据源
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: datasourceId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: OK

  /api/v1/tenants/{slug}/projects:
    get:
      operationId: listProjects
      tags: [Projects]
      summary: 项目列表
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
    post:
      operationId: createProject
      tags: [Projects]
      summary: 创建项目
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "200":
          description: OK

  /api/v1/tenants/{slug}/projects/{projectId}:
    get:
      operationId: getProject
      tags: [Projects]
      summary: 获取项目详情
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: projectId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: OK
    put:
      operationId: updateProject
      tags: [Projects]
      summary: 编辑项目
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: projectId, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: OK
    delete:
      operationId: deleteProject
      tags: [Projects]
      summary: 删除项目
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: projectId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: OK

  /api/v1/tenants/{slug}/projects/{projectId}/endpoints:
    get:
      operationId: listEndpoints
      tags: [Endpoints]
      summary: 接口列表
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: projectId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: OK
    post:
      operationId: createEndpoint
      tags: [Endpoints]
      summary: 创建接口
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: projectId, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEndpointRequest"
      responses:
        "200":
          description: OK

  /api/v1/tenants/{slug}/projects/{projectId}/endpoints/{endpointId}:
    put:
      operationId: updateEndpoint
      tags: [Endpoints]
      summary: 更新接口
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: projectId, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: endpointId, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAPIEndpointRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIEndpoint"
    delete:
      operationId: deleteEndpoint
      tags: [Endpoints]
      summary: 删除接口
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: projectId, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: endpointId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: OK

  /api/v1/tenants/{slug}/projects/{projectId}/groups:
    get:
      operationId: listGroups
      tags: [Groups]
      summary: 分组列表
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: projectId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: OK
    post:
      operationId: createGroup
      tags: [Groups]
      summary: 创建分组
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: projectId, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroupRequest"
      responses:
        "200":
          description: OK

  /api/v1/tenants/{slug}/projects/{projectId}/groups/{groupId}:
    put:
      operationId: updateGroup
      tags: [Groups]
      summary: 编辑分组
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: projectId, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: groupId, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAPIGroupRequest"
      responses:
        "200":
          description: OK
    delete:
      operationId: deleteGroup
      tags: [Groups]
      summary: 删除分组
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: projectId, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: groupId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: OK

  /api/v1/tenants/{slug}/projects/{projectId}/openapi.json:
    get:
      operationId: exportOpenAPI
      tags: [Endpoints]
      summary: 导出 OpenAPI文档
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: projectId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: OK

  /api/v1/tenants/{slug}/query/test:
    post:
      operationId: testQuery
      tags: [Queries]
      summary: 测试执行 SQL 查询
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestQueryRequest"
      responses:
        "200":
          description: OK

  /api/v1/tenants/{slug}/scripts:
    get:
      operationId: listScripts
      tags: [Scripts]
      summary: 脚本列表
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
    post:
      operationId: createScript
      tags: [Scripts]
      summary: 创建脚本
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScriptRequest"
      responses:
        "200":
          description: OK

  /api/v1/tenants/{slug}/scripts/{scriptId}:
    put:
      operationId: updateScript
      tags: [Scripts]
      summary: 编辑脚本
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: scriptId, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateScriptRequest"
      responses:
        "200":
          description: OK
    delete:
      operationId: deleteScript
      tags: [Scripts]
      summary: 删除脚本
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: scriptId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: OK

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegisterRequest:
      type: object
      required: [email, name, password]
      properties:
        email: { type: string, format: email }
        name: { type: string }
        password: { type: string, format: password }
        tenant_name: { type: string }
        tenant_slug: { type: string }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }

    AuthResponse:
      type: object
      properties:
        user: { $ref: "#/components/schemas/User" }
        token: { type: string }
        tenant: { $ref: "#/components/schemas/Tenant" }
        tenants:
          type: array
          items: { $ref: "#/components/schemas/Tenant" }

    User:
      type: object
      properties:
        id: { type: integer, format: int64 }
        email: { type: string }
        name: { type: string }
        is_superadmin: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Tenant:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        slug: { type: string }
        plan: { type: string, enum: [Free, Pro, Enterprise] }
        status: { type: string, enum: [Active, Warning, Suspended] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateTenantRequest:
      type: object
      required: [name, slug]
      properties:
        name: { type: string }
        slug: { type: string }
        plan: { type: string, enum: [Free, Pro, Enterprise] }

    UpdateTenantRequest:
      type: object
      properties:
        name: { type: string }
        plan: { type: string, enum: [Free, Pro, Enterprise] }
        status: { type: string, enum: [Active, Warning, Suspended] }

    TenantUser:
      type: object
      properties:
        tenant_id: { type: integer, format: int64 }
        user_id: { type: integer, format: int64 }
        role: { type: string, enum: [Admin, Viewer] }
        joined_at: { type: string, format: date-time }
        user: { $ref: "#/components/schemas/User" }

    AddUserRequest:
      type: object
      required: [email, name, password, role]
      properties:
        email: { type: string, format: email }
        name: { type: string }
        password: { type: string, format: password }
        role: { type: string, enum: [Admin, Viewer] }

    UpdateRoleRequest:
      type: object
      required: [role]
      properties:
        role: { type: string, enum: [Admin, Viewer] }

    Gateway:
      type: object
      properties:
        id: { type: integer, format: int64 }
        tenant_id: { type: integer, format: int64 }
        name: { type: string }
        status: { type: string, enum: [online, offline] }
        ip: { type: string }
        last_seen: { type: string, format: date-time }
        version: { type: string }

    CreateGatewayRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }

    CreateGatewayResponse:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        token: { type: string }
        status: { type: string }
        version: { type: string }

    DataSource:
      type: object
      properties:
        id: { type: integer, format: int64 }
        tenant_id: { type: integer, format: int64 }
        name: { type: string }
        is_dual: { type: boolean }
        type: { type: string, enum: [mysql, postgres, sqlserver, starrocks, doris, sqlite] }
        envs:
          type: array
          items:
            $ref: "#/components/schemas/DataSourceEnv"
        created_at: { type: string, format: date-time }

    DataSourceEnv:
      type: object
      properties:
        id: { type: integer, format: int64 }
        datasource_id: { type: integer, format: int64 }
        env: { type: string, enum: [dev, prod] }
        dsn: { type: string }
        gateway_id: { type: integer, format: int64 }

    CreateDataSourceRequest:
      type: object
      required: [name, type, envs]
      properties:
        name: { type: string }
        type: { type: string, enum: [mysql, postgres, sqlserver, starrocks, doris, sqlite] }
        is_dual: { type: boolean }
        envs:
          type: array
          items:
            type: object
            required: [env, dsn, gateway_id]
            properties:
              env: { type: string, enum: [dev, prod] }
              dsn: { type: string }
              gateway_id: { type: integer, format: int64 }

    UpdateDataSourceRequest:
      type: object
      properties:
        name: { type: string }
        type: { type: string, enum: [mysql, postgres, sqlserver, starrocks, doris, sqlite] }
        is_dual: { type: boolean }
        envs:
          type: array
          items:
            type: object
            required: [env, dsn, gateway_id]
            properties:
              env: { type: string, enum: [dev, prod] }
              dsn: { type: string }
              gateway_id: { type: integer, format: int64 }

    Project:
      type: object
      properties:
        id: { type: integer, format: int64 }
        tenant_id: { type: integer, format: int64 }
        name: { type: string }
        description: { type: string }
        created_at: { type: string, format: date-time }

    CreateProjectRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        description: { type: string }

    UpdateProjectRequest:
      type: object
      properties:
        name: { type: string }
        description: { type: string }

    APIEndpoint:
      type: object
      required: [id, tenant_id, project_id, path, methods, sql]
      properties:
        id: { type: integer, format: int64 }
        tenant_id: { type: integer, format: int64 }
        project_id: { type: integer, format: int64 }
        group_id: { type: integer, format: int64 }
        datasource_id: { type: integer, format: int64 }
        path: { type: string }
        methods: { type: array, items: { type: string } }
        summary: { type: string }
        description: { type: string }
        sql: { type: string }
        params: { type: array, items: { type: string } }
        param_defs:
          type: array
          items:
            $ref: "#/components/schemas/ParamDef"
        pre_script_id: { type: integer, format: int64 }
        post_script_id: { type: integer, format: int64 }
        created_at: { type: string, format: date-time }

    CreateEndpointRequest:
      type: object
      required: [path, methods, sql]
      properties:
        path: { type: string }
        methods: { type: array, items: { type: string } }
        sql: { type: string }
        params: { type: array, items: { type: string } }
        param_defs:
          type: array
          items:
            $ref: "#/components/schemas/ParamDef"
        datasource_id: { type: integer, format: int64 }
        group_id: { type: integer, format: int64 }
        pre_script_id: { type: integer, format: int64 }
        post_script_id: { type: integer, format: int64 }

    UpdateAPIEndpointRequest:
      type: object
      properties:
        path: { type: string }
        methods: { type: array, items: { type: string } }
        sql: { type: string }
        summary: { type: string }
        description: { type: string }
        params: { type: array, items: { type: string } }
        param_defs:
          type: array
          items:
            $ref: "#/components/schemas/ParamDef"
        datasource_id: { type: integer, format: int64 }
        group_id: { type: integer, format: int64 }
        pre_script_id: { type: integer, format: int64 }
        post_script_id: { type: integer, format: int64 }

    ParamDef:
      type: object
      required: [name, type, required]
      properties:
        name: { type: string }
        type: { type: string }
        required: { type: boolean }
        default: { type: string }
        desc: { type: string }

    CreateGroupRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
