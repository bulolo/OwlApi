# OwlApi 生产部署配置
#
# 使用方法：
# 1. 配置环境变量（.env 文件或直接修改）
# 2. 运行: docker compose up -d

services:
  # Control Plane Backend
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: registry.cn-hangzhou.aliyuncs.com/owlapi/server:${DOCKER_IMAGE_TAG:-v0.1.6}
    container_name: owlapi_backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"   # HTTP API
      # 9090 gRPC 仅供容器内部 Gateway 使用，不对外暴露
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/owlapi?sslmode=disable
      - OWLAPI_HTTP_PORT=:3000
      - OWLAPI_JWT_SECRET=${OWLAPI_JWT_SECRET:-change-me-in-production}
      - OWLAPI_CORS_ORIGIN=${OWLAPI_CORS_ORIGIN:-*}
      - OWLAPI_LOG_LEVEL=${OWLAPI_LOG_LEVEL:-info}
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      backend-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # Admin Frontend
  admin:
    build:
      context: ../frontend/admin
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:3000}
    image: registry.cn-hangzhou.aliyuncs.com/owlapi/admin:${DOCKER_IMAGE_TAG:-v0.1.6}
    container_name: owlapi_admin
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      - NEXT_PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:3000}
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # PostgreSQL Database
  postgres:
    image: postgres:18-alpine
    container_name: owlapi_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=owlapi
      - TZ=Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Built-in Gateway Node (local, connects to backend via gRPC)
  gateway:
    build:
      context: ../backend
      dockerfile: Dockerfile.gateway
    image: registry.cn-hangzhou.aliyuncs.com/owlapi/gateway:${DOCKER_IMAGE_TAG:-v0.1.6}
    container_name: owlapi_gateway
    restart: unless-stopped
    environment:
      - OWLAPI_SERVER_URL=dns:///backend:9090
      - OWLAPI_GATEWAY_ID=${OWLAPI_GATEWAY_ID:-1}
      - OWLAPI_GATEWAY_TOKEN=${OWLAPI_GATEWAY_TOKEN:-}
      - OWLAPI_TENANT_ID=${OWLAPI_TENANT_ID:-1}
      - TZ=Asia/Shanghai
    volumes:
      - gateway_data:/data
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Backend Init: schema + seed demo data (runs every startup)
  backend-init:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: registry.cn-hangzhou.aliyuncs.com/owlapi/server:${DOCKER_IMAGE_TAG:-v0.1.6}
    container_name: owlapi_init
    command: ["./init"]
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/owlapi?sslmode=disable
      - OWLAPI_GATEWAY_TOKEN=${OWLAPI_GATEWAY_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
  gateway_data:
