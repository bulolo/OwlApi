# OwlApi 生产部署配置
#
# 使用方法：
# 1. 配置环境变量（.env 文件或直接修改）
# 2. 运行: docker compose up -d

services:
  # Control Plane Backend
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile.server
    image: registry.cn-hangzhou.aliyuncs.com/owlapi/server:latest
    container_name: owlapi_backend
    restart: unless-stopped
    ports:
      - "3000:3000"   # HTTP API
      - "9090:9090"   # gRPC (Gateway 连接)
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/owlapi?sslmode=disable
      - OWLAPI_HTTP_PORT=:3000
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      backend-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'

  # Frontend
  frontend:
    build:
      context: ../../frontend/admin
      dockerfile: Dockerfile.frontend
      args:
        - NEXT_PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:3000}
    image: registry.cn-hangzhou.aliyuncs.com/owlapi/frontend:latest
    container_name: owlapi_frontend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - NEXT_PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:3000}
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # Local Gateway Node (Automatically connected to this cluster)
  gateway:
    build:
      context: ../../backend
      dockerfile: Dockerfile.runner
    image: registry.cn-hangzhou.aliyuncs.com/owlapi/gateway:latest
    container_name: owlapi_gateway_local
    restart: unless-stopped
    environment:
      - OWLAPI_SERVER_URL=http://backend:9090
      - OWLAPI_RUNNER_ID=default-local-gateway
      - OWLAPI_RUNNER_TOKEN=change-me-in-production
      - TZ=Asia/Shanghai
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # PostgreSQL Database
  postgres:
    image: postgres:18-alpine
    container_name: owlapi_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=owlapi
      - TZ=Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # Backend Init: schema + seed demo data (runs every startup)
  backend-init:
    build:
      context: ../../backend
      dockerfile: Dockerfile.server
    image: registry.cn-hangzhou.aliyuncs.com/owlapi/server:latest
    container_name: owlapi_init
    command: ["./init"]
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/owlapi?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
