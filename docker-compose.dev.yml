version: "3.8"

services:
  # Control Plane Server (Hot Reload)
  server:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: owlapi_server_dev
    command: air -c .air.server.toml
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "9090:9090"
    volumes:
      - ./backend:/app
      - /app/tmp # Mount tmp as anonymous volume to avoid host permission issues and conflicts
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/owlapi?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

  # Frontend (Hot Reload)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: owlapi_frontend_dev
    command: sh -c "pnpm install && pnpm dev"
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules # Anonymous volume for container dependencies
      - /app/.next # Anonymous volume for build cache
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      server:
        condition: service_started

  # Local Runner Node (Hot Reload)
  runner:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: owlapi_runner_dev
    command: air -c .air.runner.toml
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - /app/tmp
    environment:
      - OWLAPI_SERVER_URL=dns:///server:9090
      - OWLAPI_RUNNER_ID=dev-docker-runner
      - OWLAPI_RUNNER_TOKEN=dev-token
      - TZ=Asia/Shanghai
    depends_on:
      server:
        condition: service_started

  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: owlapi_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=owlapi
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432" # Use 5433 to avoid conflict with local postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
