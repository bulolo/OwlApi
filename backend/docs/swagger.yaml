host: localhost:3000
info:
  contact: {}
  description: 企业级 SQL to API 智能网关平台管理接口
  title: OwlApi Control Plane
  version: "1.0"
paths:
  /api/v1/tenants/{slug}/query/{path}:
    post:
      consumes:
      - application/json
      operationId: executeQuery
      parameters:
      - description: 租户 slug
        in: path
        name: slug
        required: true
        type: string
      - description: API 路径
        in: path
        name: path
        required: true
        type: string
      - description: 查询参数（由端点 param_defs 定义）
        in: body
        name: body
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
      summary: 执行动态 API 查询
      tags:
      - query
  /v1/auth/login:
    post:
      consumes:
      - application/json
      operationId: login
      parameters:
      - description: 登录信息
        in: body
        name: body
        required: true
        schema:
          properties:
            email:
              type: string
            password:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.RAuth'
      summary: 用户登录
      tags:
      - auth
  /v1/auth/register:
    post:
      consumes:
      - application/json
      operationId: register
      parameters:
      - description: 注册信息
        in: body
        name: body
        required: true
        schema:
          properties:
            email:
              type: string
            name:
              type: string
            password:
              type: string
            tenant_name:
              type: string
            tenant_slug:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.RAuth'
      summary: 注册用户
      tags:
      - auth
  /v1/my/tenants:
    get:
      operationId: myTenants
      parameters:
      - description: 页码（默认1）
        in: query
        name: page
        type: integer
      - description: 每页数量（默认10）
        in: query
        name: size
        type: integer
      - description: 是否分页，0=返回全部（默认1）
        in: query
        name: is_pager
        type: integer
      - description: 关键词搜索
        in: query
        name: keyword
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.RTenantList'
      security:
      - BearerAuth: []
      summary: 获取当前用户的租户列表
      tags:
      - tenant
  /v1/tenants:
    get:
      operationId: listAllTenants
      parameters:
      - description: 页码（默认1）
        in: query
        name: page
        type: integer
      - description: 每页数量（默认10）
        in: query
        name: size
        type: integer
      - description: 是否分页，0=返回全部（默认1）
        in: query
        name: is_pager
        type: integer
      - description: 关键词搜索
        in: query
        name: keyword
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.RTenantList'
      security:
      - BearerAuth: []
      summary: 获取所有租户 (SuperAdmin)
      tags:
      - tenant
    post:
      consumes:
      - application/json
      operationId: createTenant
      parameters:
      - description: 租户信息
        in: body
        name: body
        required: true
        schema:
          properties:
            name:
              type: string
            plan:
              type: string
            slug:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.RTenant'
      security:
      - BearerAuth: []
      summary: 创建租户 (SuperAdmin)
      tags:
      - tenant
  /v1/tenants/{slug}:
    delete:
      operationId: deleteTenant
      parameters:
      - description: 租户slug
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.R'
      security:
      - BearerAuth: []
      summary: 删除租户 (SuperAdmin)
      tags:
      - tenant
    get:
      operationId: getTenant
      parameters:
      - description: 租户slug
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.RTenant'
      security:
