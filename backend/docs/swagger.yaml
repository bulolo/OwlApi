        required: true
        schema:
          properties:
            name:
              type: string
            plan:
              type: string
            status:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.RTenant'
      security:
      - BearerAuth: []
      summary: 更新租户 (SuperAdmin)
      tags:
      - tenant
