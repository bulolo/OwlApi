version: "3.8"

services:
  # Control Plane Server
  server:
    build:
      context: ./backend
      dockerfile: Dockerfile.server
    container_name: owlapi_server
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "9090:9090" # gRPC for Runner connection
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/owlapi?sslmode=disable
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8080
    container_name: owlapi_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      server:
        condition: service_healthy

  # Local Runner Node (Dev Mode)
  runner:
    build:
      context: ./backend
      dockerfile: Dockerfile.runner
    container_name: owlapi_runner_dev
    restart: unless-stopped
    environment:
      - OWLAPI_SERVER_URL=http://server:9090
      - OWLAPI_RUNNER_ID=dev-local-runner
      - OWLAPI_RUNNER_TOKEN=dev-token
      - TZ=Asia/Shanghai
    depends_on:
      server:
        condition: service_healthy

  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: owlapi_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=owlapi
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
